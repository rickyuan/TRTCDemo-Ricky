version: '3.9'

services:
  server:
    build: ./server
    ports:
      - "3000:3000"
    env_file:
      - ./server/.env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  web:
    build: ./web
    ports:
      - "8080:80"
    restart: unless-stopped
    depends_on:
      - server
