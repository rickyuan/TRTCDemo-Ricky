<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TRTC 视频通话 - Web</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ── Login Screen ─────────────────────────────────────────────────── -->
  <div id="login-screen" class="screen">
    <div class="card">
      <h1>TRTC 视频通话</h1>
      <p class="subtitle">Web 端</p>
      <div class="form-group">
        <label for="input-userid">用户 ID</label>
        <input id="input-userid" type="text" placeholder="例如: web_user_001" value="web_user_001" />
      </div>
      <button id="btn-login" class="btn btn-primary">登录 &amp; 等待来电</button>
      <div id="login-status" class="status-text"></div>
    </div>
  </div>

  <!-- ── Incoming Call Screen ──────────────────────────────────────────── -->
  <div id="incoming-screen" class="screen hidden">
    <div class="card">
      <div class="call-icon">📞</div>
      <h2>来电</h2>
      <p id="caller-name" class="caller-name">Android 用户</p>
      <p class="call-type">视频通话邀请</p>
      <div class="call-actions">
        <button id="btn-decline" class="btn btn-danger">挂断</button>
        <button id="btn-accept"  class="btn btn-success">接听</button>
      </div>
    </div>
  </div>

  <!-- ── Call Screen ───────────────────────────────────────────────────── -->
  <div id="call-screen" class="screen hidden">
    <!-- Remote video (large) -->
    <div id="remote-video-container">
      <div id="remote-video" class="video-view"></div>
      <div id="remote-placeholder" class="video-placeholder">
        <span>等待对方视频...</span>
      </div>
    </div>

    <!-- Local video (PiP) -->
    <div id="local-video-container">
      <div id="local-video" class="video-view"></div>
    </div>

    <!-- Status bar -->
    <div id="call-status-bar">
      <span id="call-timer">00:00</span>
      <span id="call-status-text">连接中...</span>
    </div>

    <!-- Controls -->
    <div id="controls">
      <button id="btn-toggle-mic"  class="ctrl-btn" title="麦克风">
        <span class="icon">🎤</span>
        <span class="label">麦克风</span>
      </button>
      <button id="btn-toggle-cam"  class="ctrl-btn" title="摄像头">
        <span class="icon">📷</span>
        <span class="label">摄像头</span>
      </button>
      <button id="btn-hangup"      class="ctrl-btn ctrl-btn-danger" title="挂断">
        <span class="icon">📵</span>
        <span class="label">挂断</span>
      </button>
    </div>
  </div>

  <!-- ── SDKs (CDN) ──────────────────────────────────────────────────── -->
  <script src="https://www.unpkg.com/trtc-sdk-v5@latest/trtc.js"></script>
  <script src="https://www.unpkg.com/@tencentcloud/chat@latest/index.js"></script>
  <script src="https://www.unpkg.com/pako@2.1.0/dist/pako.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
